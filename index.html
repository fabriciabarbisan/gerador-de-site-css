<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <title>Criador de Sites</title>
</head>

<body>
    <p class="titulo">✨ Gerador com Inteligência Artificial ✨</p>

    <h1>Crie sua Página <br> <span>com um prompt</span></h1>

    <p class="subtitulo">Descreva seu negócio e veja a IA criar um site profissional em segundos.</p>

    <div class="caixa_entrada">
        <textarea class="texto-pagina" placeholder="Descreva seu negócio. Ex.: Confeitaria, Mercado, Loja de Roupas, etc."></textarea>
        <button onclick="gerarcodigo()">Gerar ✨</button>
    </div>

    <div class="caixa_resultado">
        <p class="bloco_codigo"></p>
        <iframe class="bloco_site"></iframe>
    </div>
</body>

<script src="scripts.js">

</script>

</html>
